version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb+srv://pumpkin200772_db_user:sample@cluster0.w3f4uhj.mongodb.net/agribot_system
